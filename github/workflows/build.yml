name: Mostafa_Build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          cl.exe /MT /O2 main.cpp user32.lib gdi32.lib /Fe:Mostafa_Scanner.exe /link /SUBSYSTEM:WINDOWS,5.01
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Mostafa_Hack_File
          path: Mostafa_Scanner.exe
